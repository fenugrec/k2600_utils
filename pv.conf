[dut]
#conn. settings for k26xx; for GPIB connection use e.g. 'GPIB0::26::INSTR' ; baud and flow are ignored
res = 'ASRL/dev/ttyUSB0::INSTR'
baud = 115200
# flow can be VI_ASRL_FLOW_NONE , VI_ASRL_FLOW_XON_XOFF, VI_ASRL_FLOW_DTR_DSR
flow = 'VI_ASRL_FLOW_RTS_CTS'

[dmm]
res = 'GPIB0::23::INSTR'

[pv]
 #settling time for all V and low I ranges
step_dwell = 0.1
#for 3A ranges:
ipulse_ton = 100e-3
#cooldown after 3A
ipulse_toff = 10

#as characterized for 3A range
r5_actual = 0.5
