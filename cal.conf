[dut]
#conn. settings for k26xx; for GPIB connection use e.g. 'GPIB0::26::INSTR' ; baud and flow are ignored
res = 'ASRL/dev/ttyUSB0::INSTR'
baud = 115200
# flow can be none, rts_cts, xon_xoff see pyvisa.constants.ControlFlow
flow = 'none'

[dmm]
driver = 'dmm_3478'
res = 'GPIB0::23::INSTR'

[cal]
# discard a few readings then save the few next for median + stats
discard_v = 2
keep_v = 3

discard_i = 2
keep_i = 3

#default settling time for all V and low I ranges
step_dwell = 1
#for 3A/10A ranges:
ipulse_ton = 100e-3
#cooldown after 3A/10A
ipulse_toff = 0.10

#per-range settling times; optional
dly_100mA = 1
dly_1A = 1


#as characterized for 3A/10A ranges
r5_actual = 0.5
# for contact check; not sure if needs measurement (SM just gives 0)
r0_actual = 0
#50r resistor to tie between L and SL (step 4)
r50_l = 50
#50r resistor to tie between H and SH (step 4)
r50_h = 50
